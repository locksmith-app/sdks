# Publish every SDK to its package registry from GitHub-hosted runners (no local toolchains required).
#
# Trigger manually after you bump versions in each SDK manifest, or when you publish a GitHub Release.
#
# Secrets: see .github/PUBLISH_SDK_SECRETS.md
#
# Skipping: registry tokens are read in `env` only; each job uses a shell guard so missing secrets
# produce a notice and exit 0 (no failed job). This avoids `secrets` in `if:` expressions, which
# many validators reject.

name: Publish SDKs

on:
  workflow_dispatch:
  release:
    types: [published]

concurrency:
  group: publish-sdks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  verify-go:
    name: Verify Go SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
      - run: go test ./...
        working-directory: sdks/go

  verify-java:
    name: Verify Java SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - run: mvn -B -q verify
        working-directory: sdks/java

  verify-kotlin:
    name: Verify Kotlin SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.11.1
      - run: gradle build
        working-directory: sdks/kotlin

  verify-swift:
    name: Verify Swift SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: "5.10"
      - run: swift build
        working-directory: sdks/swift

  publish-npm:
    name: Publish TypeScript (npm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: sdks/typescript/package-lock.json
      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "::notice::Skipping npm publish — add NPM_TOKEN secret."
            exit 0
          fi
          cd sdks/typescript
          npm ci
          npm run build
          npm publish --access public --provenance

  publish-pypi:
    name: Publish Python (PyPI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build and publish to PyPI
        env:
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${TWINE_PASSWORD:-}" ]; then
            echo "::notice::Skipping PyPI — add PYPI_API_TOKEN secret."
            exit 0
          fi
          pip install build twine
          cd sdks/python
          python -m build
          TWINE_USERNAME=__token__ twine upload dist/*

  publish-crates-io:
    name: Publish Rust (crates.io)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "::notice::Skipping crates.io — add CRATES_IO_TOKEN secret."
            exit 0
          fi
          cd sdks/rust
          cargo publish

  publish-rubygems:
    name: Publish Ruby (RubyGems)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          working-directory: sdks/ruby
          bundler-cache: false
      - name: Push gem
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${GEM_HOST_API_KEY:-}" ]; then
            echo "::notice::Skipping RubyGems — add RUBYGEMS_API_KEY secret."
            exit 0
          fi
          cd sdks/ruby
          gem build locksmith-ruby.gemspec
          gem push locksmith-ruby-*.gem

  publish-nuget:
    name: Publish .NET (NuGet)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Pack and push
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          set -euo pipefail
          cd sdks/dotnet
          if [ -z "${NUGET_API_KEY:-}" ]; then
            echo "::notice::Skipping NuGet — add NUGET_API_KEY secret."
            exit 0
          fi
          dotnet pack -c Release -o dist
          dotnet nuget push dist/*.nupkg -s https://api.nuget.org/v3/index.json -k "$NUGET_API_KEY" --skip-duplicate

  publish-pub-dev:
    name: Publish Dart (pub.dev)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Publish to pub.dev
        env:
          PUB_CREDENTIALS_JSON: ${{ secrets.PUB_CREDENTIALS_JSON }}
        run: |
          set -euo pipefail
          if [ -z "${PUB_CREDENTIALS_JSON:-}" ]; then
            echo "::notice::Skipping pub.dev — add PUB_CREDENTIALS_JSON secret."
            exit 0
          fi
          mkdir -p "$HOME/.config/dart"
          printf '%s\n' "$PUB_CREDENTIALS_JSON" > "$HOME/.config/dart/pub-credentials.json"
          cd sdks/dart
          dart pub publish -f

  publish-hex:
    name: Publish Elixir (Hex)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.16"
          otp-version: "26"
      - name: Publish to Hex
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${HEX_API_KEY:-}" ]; then
            echo "::notice::Skipping Hex — add HEX_API_KEY secret."
            exit 0
          fi
          cd sdks/elixir
          mix deps.get
          mix hex.publish --yes

  refresh-packagist:
    name: Refresh Packagist (PHP)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update package on Packagist
        env:
          PACKAGIST_USERNAME: ${{ secrets.PACKAGIST_USERNAME }}
          PACKAGIST_API_TOKEN: ${{ secrets.PACKAGIST_API_TOKEN }}
          PACKAGIST_REPO: ${{ vars.PACKAGIST_REPOSITORY_URL }}
        run: |
          set -euo pipefail
          if [ -z "${PACKAGIST_USERNAME:-}" ] || [ -z "${PACKAGIST_API_TOKEN:-}" ]; then
            echo "::notice::Skipping Packagist — add PACKAGIST_USERNAME and PACKAGIST_API_TOKEN secrets."
            exit 0
          fi
          REPO="${PACKAGIST_REPO:-https://github.com/locksmith-app/sdk-php}"
          curl -fsS -X POST \
            --user "${PACKAGIST_USERNAME}:${PACKAGIST_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"repository\":{\"url\":\"${REPO}\"}}" \
            "https://packagist.org/api/update-package?username=${PACKAGIST_USERNAME}"
