# Publish every SDK to its package registry from GitHub-hosted runners (no local toolchains required).
#
# Trigger manually after you bump versions in each SDK manifest, or when you publish a GitHub Release.
#
# ── Secrets: see .github/PUBLISH_SDK_SECRETS.md
#
# Note: `secrets` cannot be used in job-level `if:` (GitHub expression rules). Each publish step
# uses step-level `if:` so jobs are skipped at step granularity when a secret is unset.

name: Publish SDKs

on:
  workflow_dispatch:
  release:
    types: [published]

concurrency:
  group: publish-sdks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  # ── Optional: sanity checks (no registry secrets) ─────────────────────────
  verify-go:
    name: Verify Go SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
      - run: go test ./...
        working-directory: sdks/go

  verify-java:
    name: Verify Java SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - run: mvn -B -q verify
        working-directory: sdks/java

  verify-kotlin:
    name: Verify Kotlin SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.11.1
      - run: gradle build
        working-directory: sdks/kotlin

  verify-swift:
    name: Verify Swift SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: "5.10"
      - run: swift build
        working-directory: sdks/swift

  # ── npm (@getlocksmith/sdk) ─────────────────────────────────────────────────
  publish-npm:
    name: Publish TypeScript (npm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        if: ${{ secrets.NPM_TOKEN != '' }}
        with:
          node-version: "20"
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: sdks/typescript/package-lock.json
      - if: ${{ secrets.NPM_TOKEN != '' }}
        run: npm ci && npm run build
        working-directory: sdks/typescript
      - if: ${{ secrets.NPM_TOKEN != '' }}
        run: npm publish --access public --provenance
        working-directory: sdks/typescript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── PyPI (locksmith-py) ────────────────────────────────────────────────────
  publish-pypi:
    name: Publish Python (PyPI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        if: ${{ secrets.PYPI_API_TOKEN != '' }}
        with:
          python-version: "3.12"
      - if: ${{ secrets.PYPI_API_TOKEN != '' }}
        run: pip install build && python -m build
        working-directory: sdks/python
      - uses: pypa/gh-action-pypi-publish@release/v1
        if: ${{ secrets.PYPI_API_TOKEN != '' }}
        with:
          packages-dir: sdks/python/dist/
          password: ${{ secrets.PYPI_API_TOKEN }}

  # ── crates.io (getlocksmith) ───────────────────────────────────────────────
  publish-crates-io:
    name: Publish Rust (crates.io)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        if: ${{ secrets.CRATES_IO_TOKEN != '' }}
      - if: ${{ secrets.CRATES_IO_TOKEN != '' }}
        run: cargo publish
        working-directory: sdks/rust
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

  # ── RubyGems (locksmith-ruby) ──────────────────────────────────────────────
  publish-rubygems:
    name: Publish Ruby (RubyGems)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        if: ${{ secrets.RUBYGEMS_API_KEY != '' }}
        with:
          ruby-version: "3.3"
          working-directory: sdks/ruby
          bundler-cache: false
      - if: ${{ secrets.RUBYGEMS_API_KEY != '' }}
        run: gem build locksmith-ruby.gemspec && gem push locksmith-ruby-*.gem
        working-directory: sdks/ruby
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}

  # ── NuGet (Locksmith.Sdk) ───────────────────────────────────────────────────
  publish-nuget:
    name: Publish .NET (NuGet)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        if: ${{ secrets.NUGET_API_KEY != '' }}
        with:
          dotnet-version: "8.0.x"
      - if: ${{ secrets.NUGET_API_KEY != '' }}
        run: dotnet pack -c Release -o dist
        working-directory: sdks/dotnet
      - if: ${{ secrets.NUGET_API_KEY != '' }}
        run: dotnet nuget push dist/*.nupkg -s https://api.nuget.org/v3/index.json -k "$NUGET_API_KEY" --skip-duplicate
        working-directory: sdks/dotnet
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

  # ── pub.dev (locksmith_dart) ────────────────────────────────────────────────
  publish-pub-dev:
    name: Publish Dart (pub.dev)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        if: ${{ secrets.PUB_CREDENTIALS_JSON != '' }}
        with:
          sdk: stable
      - name: Write pub credentials
        if: ${{ secrets.PUB_CREDENTIALS_JSON != '' }}
        run: |
          mkdir -p "$HOME/.config/dart"
          echo "$PUB_CREDENTIALS_JSON" > "$HOME/.config/dart/pub-credentials.json"
        env:
          PUB_CREDENTIALS_JSON: ${{ secrets.PUB_CREDENTIALS_JSON }}
      - if: ${{ secrets.PUB_CREDENTIALS_JSON != '' }}
        run: dart pub publish -f
        working-directory: sdks/dart

  # ── Hex.pm (locksmith_ex) ───────────────────────────────────────────────────
  publish-hex:
    name: Publish Elixir (Hex)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        if: ${{ secrets.HEX_API_KEY != '' }}
        with:
          elixir-version: "1.16"
          otp-version: "26"
      - if: ${{ secrets.HEX_API_KEY != '' }}
        run: mix deps.get
        working-directory: sdks/elixir
      - if: ${{ secrets.HEX_API_KEY != '' }}
        run: mix hex.publish --yes
        working-directory: sdks/elixir
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}

  # ── Packagist (locksmith/sdk-php) — refreshes metadata after you tagged the GitHub repo ──
  refresh-packagist:
    name: Refresh Packagist (PHP)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update package on Packagist
        if: ${{ secrets.PACKAGIST_API_TOKEN != '' && secrets.PACKAGIST_USERNAME != '' }}
        env:
          PACKAGIST_USERNAME: ${{ secrets.PACKAGIST_USERNAME }}
          PACKAGIST_API_TOKEN: ${{ secrets.PACKAGIST_API_TOKEN }}
          PACKAGIST_REPO: ${{ vars.PACKAGIST_REPOSITORY_URL }}
        run: |
          REPO="${PACKAGIST_REPO:-https://github.com/locksmith-app/sdk-php}"
          curl -fsS -X POST \
            --user "${PACKAGIST_USERNAME}:${PACKAGIST_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"repository\":{\"url\":\"${REPO}\"}}" \
            "https://packagist.org/api/update-package?username=${PACKAGIST_USERNAME}"
